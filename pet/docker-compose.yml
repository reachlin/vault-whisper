services:
  simulator:
    build:
      context: .
      dockerfile: docker/simulator.Dockerfile
    restart: unless-stopped
    ports:
      - "18080:18080"
    volumes:
      - pet_data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      - PET_MOCK_HARDWARE=true

  brain:
    build:
      context: .
      dockerfile: docker/brain.Dockerfile
    restart: unless-stopped
    depends_on:
      - simulator
    env_file:
      - path: .env
        required: false
    environment:
      - SIMULATOR_URL=http://simulator:18080
      - MC_BRIDGE_URL=http://mcbridge:18090

  mcserver:
    build:
      context: .
      dockerfile: docker/mcserver.Dockerfile
    restart: unless-stopped
    ports:
      - "25565:25565"
    volumes:
      - ./data:/mc   # world, server.jar, server.properties all live here
    profiles:
      - minecraft

  mcbridge:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    command: node bridge.js
    volumes:
      - ./minecraft:/app
    environment:
      - MC_BRIDGE_PORT=18090
      - SIMULATOR_URL=http://simulator:18080
    ports:
      - "18090:18090"
    depends_on:
      - simulator
      - mcserver
    profiles:
      - minecraft

  test:
    build:
      context: .
      dockerfile: docker/test.Dockerfile
    volumes:
      - .:/app
    environment:
      - PET_MOCK_HARDWARE=true

volumes:
  pet_data:
