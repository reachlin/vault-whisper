<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Pet Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 14px;
    }
    h1 { font-size: 1.2rem; color: #58a6ff; letter-spacing: 2px; }

    #layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      width: 100%;
      max-width: 940px;
    }

    /* ── Map panel ── */
    #map-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #map-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: #f5a623;
      letter-spacing: 1px;
    }
    #map-canvas {
      border: 1px solid #1a3a1a;
      border-radius: 6px;
      background: #060e06;
      display: block;
      width: 100%;
    }

    /* ── Zork text log ── */
    #zork-log {
      background: #060e06;
      border: 1px solid #1a3a1a;
      border-radius: 6px;
      height: 130px;
      overflow-y: auto;
      padding: 8px 12px;
      font-size: 0.76rem;
      line-height: 1.5;
      color: #00cc00;
    }
    #zork-log::-webkit-scrollbar { width: 4px; }
    #zork-log::-webkit-scrollbar-thumb { background: #1a3a1a; }
    .zork-cmd  { color: #56ff90; margin-top: 4px; }
    .zork-room { color: #7fff7f; font-weight: bold; }
    .zork-line { color: #00aa00; }

    /* ── Right sidebar ── */
    #sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 190px;
    }
    #hud {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      font-size: 0.8rem;
    }
    #hud h2 { color: #58a6ff; font-size: 0.82rem; margin-bottom: 2px; }
    .hud-row { display: flex; justify-content: space-between; gap: 8px; }
    .hud-val { color: #79c0ff; }
    #zork-hud {
      background: #0d200d;
      border: 1px solid #1a4a1a;
      border-radius: 6px;
      padding: 10px 14px;
      display: none;
      flex-direction: column;
      gap: 6px;
      font-size: 0.8rem;
    }
    #zork-hud h2 { color: #56ff90; font-size: 0.82rem; margin-bottom: 2px; }
    #controls-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ctrl-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.72rem;
      color: #8b949e;
    }
    video {
      width: 100%;
      border: 1px solid #30363d;
      border-radius: 4px;
      background: #000;
    }
    button {
      background: #238636;
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.82rem;
      padding: 5px 12px;
    }
    button:hover { filter: brightness(1.15); }
    #zork-btn { background: #1a6e1a; width: 100%; padding: 7px; font-size: 0.88rem; letter-spacing: 1px; }
    #zork-btn.active { background: #b91c1c; }

    /* ── Bottom ── */
    #speech-display {
      background: #161b22;
      border: 1px solid #388bfd;
      border-radius: 6px;
      padding: 9px 14px;
      width: 100%;
      max-width: 940px;
      min-height: 38px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #speech-display .label { color: #388bfd; font-size: 0.72rem; white-space: nowrap; flex-shrink: 0; }
    #speech-text { flex: 1; font-style: italic; color: #56d364; word-break: break-word; }
    #speech-text.empty { color: #30363d; font-style: normal; }
    #speak-form { display: flex; gap: 8px; width: 100%; max-width: 940px; }
    #speak-input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #e6edf3;
      padding: 5px 10px;
      font-family: inherit;
      font-size: 0.82rem;
    }
    #brain-log {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      width: 100%;
      max-width: 940px;
      height: 90px;
      overflow-y: auto;
      font-size: 0.75rem;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <h1>AI PET SIMULATOR — ZORK EXPLORER</h1>

  <div id="layout">
    <div id="map-panel">
      <div id="map-header">
        <span>DISCOVERED MAP</span>
        <span id="map-stats">no rooms yet — click Play Zork to start</span>
      </div>
      <canvas id="map-canvas" width="580" height="380"></canvas>
      <div id="zork-log"><span style="color:#1a4a1a">Zork game log will appear here…</span></div>
    </div>

    <div id="sidebar">
      <div id="hud">
        <h2>PET STATUS</h2>
        <div class="hud-row"><span>mood</span><span class="hud-val" id="h-mood">—</span></div>
        <div class="hud-row"><span>tick</span><span class="hud-val" id="h-tick">—</span></div>
        <div class="hud-row"><span>ws</span><span class="hud-val" id="h-ws">connecting…</span></div>
        <div class="hud-row"><span>heard</span><span class="hud-val" id="h-heard" style="font-style:italic;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</span></div>
        <div class="hud-row"><span>status</span><span id="h-activity" style="font-weight:bold">idle</span></div>
      </div>

      <div id="zork-hud">
        <h2>ZORK STATUS</h2>
        <div class="hud-row"><span>score</span><span class="hud-val" id="zh-score">0</span></div>
        <div class="hud-row"><span>turn</span><span class="hud-val" id="zh-turn">0</span></div>
        <div class="hud-row"><span>room</span><span class="hud-val" id="zh-room" style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</span></div>
        <div class="hud-row"><span>rooms</span><span class="hud-val" id="zh-rooms">0</span></div>
      </div>

      <div id="controls-panel">
        <div class="ctrl-row">
          <span id="zork-status">not playing</span>
          <button id="zork-btn">▶ Play Zork</button>
        </div>
        <div class="ctrl-row">
          <video id="cam" autoplay muted playsinline style="display:none"></video>
          <span id="cam-status">camera off</span>
          <button id="cam-btn">Enable Camera</button>
        </div>
        <div class="ctrl-row">
          <span id="mic-status">mic off</span>
          <button id="mic-btn">Enable Mic</button>
        </div>
        <div class="ctrl-row">
          <span id="mute-status">speaker on</span>
          <button id="mute-btn">Mute Speaker</button>
        </div>
      </div>
    </div>
  </div>

  <div id="speech-display">
    <span class="label">PET SAYS</span>
    <span id="speech-text" class="empty">—</span>
  </div>

  <div id="speak-form">
    <input id="speak-input" type="text" placeholder="Type a message to Pepper…">
    <button id="speak-btn">Send</button>
  </div>

  <div id="brain-log">
    <div style="color:#58a6ff;font-weight:bold;margin-bottom:4px;">BRAIN LOG</div>
  </div>

  <script src="/static/app.js?v=9"></script>
</body>
</html>
