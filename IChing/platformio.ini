[env:m5stick-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.f_cpu = 240000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DM5STICK_S3=1
upload_resetmethod = usb
lib_deps =
    m5stack/M5Unified @ ^0.2.0
    bblanchon/ArduinoJson @ ^7.0.0
